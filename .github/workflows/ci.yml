name: CI

on:
  push:
    branches: [main, chore/project_structure]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy tinyblabla/ tests/
